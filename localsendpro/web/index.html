<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <span id="peer-count" class="muted small">connecting…</span>
    <div class="spacer"></div>
    <div class="tools">
      <button id="btn-copy" class="ghost" title="Copy link">⧉</button>
      <button id="btn-new"  class="ghost" title="New">↻</button>
    </div>
  </header>

  <main>
    <section class="card drop-zone" id="drop">
      <div id="upload-progress" class="upload hidden">
        <div class="upload-head">
          <span id="upload-label"></span>
          <span id="upload-pct" class="muted small">0%</span>
        </div>
        <div class="bar"><div id="upload-fill" class="bar-fill"></div></div>
      </div>

      <label class="drop-hint">
        <input id="file-input" type="file" multiple hidden />
        <span class="plus">+</span>
      </label>

      <ul id="file-list" class="files"></ul>
    </section>

    <section class="card">
      <textarea id="note" rows="10" placeholder=""></textarea>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
